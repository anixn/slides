.pl-30[
- Different materials reflect and absorb different wavelengths of electromagnetic radiation.

# What is Remote Sensing?
.pull-left[
- Electromagnetic radiation travels through the atmosphere two times: first from the Sun to the Earth's surface and then from the surface back to the remote sensing sensor.

- During its passage through the atmosphere, a significant portion of the incoming energy is scattered and absorbed by atmospheric constituents such as gases, water vapor, and aerosols.

- Atmospheric correction techniques are applied to minimize atmospheric scattering and absorption effects, allowing accurate retrieval of surface reflectance that represents true land surface characteristics.
]

# Drone-Based Remote Sensing (DBRS)
Drone-Based Remote Sensing (DBRS) refers to the integration of unmanned aerial vehicles (UAVs), commonly known as drones, with advanced remote sensing sensors for acquiring high-resolution spatial, spectral, and temporal data of the Earth's surface.

Unlike conventional satellite or manned airborne remote sensing, DBRS enables:

- ultra-high spatial resolution data collection,
- site-specific observations,
- on-demand temporal monitoring, and
- cost-effective surveys over localized areas.

---
# Electromagnetic Radiation: Basic Laws
- Electromagnetic energy is radiated by any body having a temperature higher than `\(-273^\circ\mathrm{C}\ (\text{or }0\ \mathrm{K})\)`, the absolute zero temperature.
- A body radiates energy in all frequencies. The relation between frequency, `\(\nu\)`, and wavelength `\(\lambda\)`, is expressible as

$$\lambda = \frac{c}{\nu} $$

# Energy Interaction with the Atmosphere
.pull-left[
.center[&lt;img src="images/eng_int.png" style="width:100%;border-radius:12px;"&gt;]
]
.pull-right[
.f3[Radiation travels through the atmosphere from the source to the sensor.]
- **Path length:** the distance traveled by electromagnetic radiation through the atmosphere.
- Path length varies depending on the remote sensing source and sensing geometry.

**Path length with platforms:**

1. Space-based optical remote sensing using solar radiation: Path length around 2 `\(\times\)` atmospheric thickness (sun to Earth and Earth to sensor).

2. Airborne thermal remote sensing using emitted terrestrial radiation: Path length aprrox. one-way distance from the Earth's surface to the sensor.
]

# Electromagnetic Spectrum
.pull-left[
- The Earth continuously interacts with electromagnetic radiation (EMR), and remote sensing is essentially the science of observing these interactions from a distance.

- Satellites/Drones do not "see" the Earth the way humans do - they detect energy across different portions of the electromagnetic spectrum, each carrying unique environmental information.

- You can think of the electromagnetic spectrum as a large scientific library where every wavelength tells a different story about the planet.
]
.pull-right[
- .red[**Visible Region (0.4-0.7 `\(\mu\)`m):** The only part detectable by the human eye. Used for natural-color imagery and land-cover mapping.]
- **Near Infrared (NIR) (0.7-1.3 `\(\mu\)`m):** Highly sensitive to vegetation health. Healthy plants strongly reflect NIR radiation, which forms the basis of indices such as NDVI.
- **Shortwave Infrared (SWIR):** Useful for detecting moisture stress, soil characteristics, and burned areas.
- **Thermal Infrared (TIR):** Measures emitted radiation related to surface temperature. Widely applied in drought monitoring, evapotranspiration studies, and urban heat analysis.
- **Microwave Region:** Used in radar remote sensing. Microwave signals can penetrate clouds and operate both day and night, making them extremely valuable for all-weather observations.
]

# Remote Sensing Sensors
RS sensors are devices that detect and measure electromagnetic radiation reflected or emitted from the Earth's surface.

### Common Drone Sensors
- **RGB cameras** for mapping and visual interpretation
- **Multispectral sensors** for vegetation and crop health analysis
- **Thermal cameras** for temperature and moisture studies
- **LiDAR sensors** for terrain and 3D surface modeling
- **Hyperspectral sensors** for detailed spectral analysis

Advantages
- Very high spatial resolution
- Flexible data acquisition
- Rapid and low-cost surveys
- Suitable for small-area and precision studies

---

.center[&lt;img src="images/sensor_all.png" style="width:88%;border-radius:12px;"&gt;]

---
# Different Parameters Of Sensors
In remote sensing resolution means the resolving power:
&gt; Capability to identify the presence of two objects

&gt; Capability to identify the properties of the two objects

***

An image that shows finer details is said to be of finer resolution compared to the image that shows coarser details

Types of Resolution: 4 types of resolutions are defined for the remote sensing systems
1. Spatial resolution (what area and how detailed)
2. Spectral resolution (what colors - bands)
3. Temporal resolution (time of day/season/year)
4. Radiometric resolution (sensitivity of a remote sensor)
---
# Spatial Resolution
- Spatial resolution refers to the clarity of features on the earth surface.
- It is the ability of the sensor to differentiate between various objects and features of the earth surface.
- In simple words, spatial resolution refers to the ratio between size of pixel and the area it represents.

.center[&lt;img src="images/spatial.png" style="width:80%;border-radius:12px;"&gt;]

One pixel can be attributed to only one color. Therefore, if one pixel in an imagery represents a large area of the land, then the pixel will hide smaller details of that large area.

---
# Spatial Resolution vs. Spatial Extent
A raster at the same extent with more pixels will have a higher resolution (it looks more "crisp"). A raster that is stretched over the same extent with fewer pixels will look more blurry and will be of lower resolution. Source: National Ecological Observatory Network (NEON)

.center[&lt;img src="images/raster_multiple_resolutions.png" style="width:90%;border-radius:12px;"&gt;]

Generally, the higher the spatial resolution, the less area is covered by a single image.

.footnote[image source: https://www.neonscience.org/resources/learning-hub/tutorials/raster-res-extent-pixels-r]

---
# Spectral Resolution
- Spectral Resolution signifies the number and width of spectral bands of the sensor.
- Typically, multispectral imagery refers to 3 to 10 bands, while hyperspectral imagery
consists of hundreds or thousands of (narrower) bands (i.e., higher spectral resolution).
- Panchromatic is a single broad band that collects a wide range of wavelength
.center[&lt;img src="images/panchromatic.jpg" style="width:80%;border-radius:12px;"&gt;]

---
# Temporal Resolution
- Temporal resolution refers to the amount of information available over a given time period.
- The time it takes for a satellite to complete one orbit cycle - also called "revisit time"
- Depends on satellite/sensor capabilities, swath overlap, and latitude
- Temporal resolution is important to understand the direction and amount of change of phenomena in the study area.
- Low temporal resolution data is more suitable for mapping large areas and for applications where changes occur slowly, such as land cover classification and geological mapping.

.center[&lt;img src="images/temporal-resolution.png" style="width:90%;border-radius:12px;"&gt;]


.footnote[Image credit: [Remote Sensing Tutorials (Natural Resources Canada)](https://natural-resources.canada.ca/maps-tools-and-publications/satellite-imagery-and-air-photos/tutorial-fundamentals-remote-sensing/satellites-and-sensors/satellite-characteristics-orbits-and-swaths/9283)]

---
# Radiometric Resolution
The radiometric resolution indicates the ability of a sensor to distinguish between different intensities within the respective wavelength range of a channel.

Simply speaking, it is the contrast of an image, indicating the number of grayscales - expressed in bits:

`\(\text{1 bit} = 2^1 = 2 \text{ gray levels}\)`

`\(\text{2 bit} = 2^2 = 4 \text{ gray levels}\)`

`\(\text{4 bit} = 2^4 = 16 \text{ gray levels}\)`

`\(\text{8 bit} = 2^8 = 256 \text{ grayscale levels}\)`

Radiometric resolution is often described in terms of bit depth, representing the number of bits used to represent pixel values. For example, an 8-bit image has `\(2^8\)` (256) possible values, while a 16-bit image can represent 216 (65,536) values. An 8-bit sensor can distinguish between 256 levels of radiation

An 8-bit image can represent 256 shades of green in a forest, while a 9-bit image can represent 512 shades, allowing finer discrimination between different tree conditions and vegetation health.

# Spectral Reflectance for vegetation
- Green vegetation exhibits a distinct reflectance pattern. Healthy vegetation appears green because it reflects a significant amount of green light while absorbing more blue and red light. This is crucial for understanding why we perceive vegetation as green.

- Healthy vegetation reflects significantly more in the near-infrared range, which is why remote sensing techniques can effectively detect vegetation health. This capability is particularly useful when analyzing environmental changes or assessing plant health.

# Color Composites
### Natural or True Color Composites
True Color Composite (TCC): An RGB image where spectral bands are assigned to match human vision, so features appear in natural colors.
Example for Landsat 8 / Landsat 9:

**RGB = Band 4 (Red), Band 3 (Green), Band 2 (Blue) -&gt; 4-3-2**
***

### False Color Composite (FCC)
False Color Composite (FCC): An RGB image where non-visible bands (commonly Near Infrared or SWIR) are assigned to visible colors to enhance specific surface features such as vegetation, moisture, or urban areas.

Common FCC for vegetation analysis in Landsat 8/9:
**RGB = Band 5 (NIR), Band 4 (Red), Band 3 (Green) -&gt; 5-4-3**

Goto : https://gsp.humboldt.edu/olm/Courses/GSP_216/lessons/composites.html

# Normalized Difference Indices (Band Ratios)
It can be used to emphasize certain aspects of the shape of the spectral signatures of different land covers, and;

It can be used to de-emphasize the effects of variable illumination within a scene.

The normalized difference vegetation index: `\(NDVI = \frac{NIR - RED}{NIR + RED}\)`

The normalized difference water index version 1: `\(NDWI1 = \frac{NIR - SWIR1}{NIR + SWIR1}\)`

The normalized difference water index version 2: `\(NDWI2 = \frac{GREEN - NIR}{GREEN + NIR}\)`

The normalized burn ratio: `\(NBR = \frac{NIR - SWIR2}{NIR + SWIR2}\)`

The normalized blue-red ratio: `\(NBRR = \frac{BLUE - RED}{BLUE + RED}\)`

# Satellite Data Processing Levels for Landsat products
Satellite data is available at different stages (or levels) of processing, going from raw data
collected from the satellite to polished products that visualize information.

NASA takes the data from satellites and processes it to make it more usable for a broad
array of applications. There is a set of terminology that NASA uses to refer to the levels of
processing it conducts:

- Level 0 &amp; 1 is the raw instrument data that may be time-referenced. It is the most
difficult to use.

- Level 2 is Level 1 data that has been converted into a geophysical quantity through a
computer algorithm (known as retrieval). This data is geo-referenced and calibrated.

- Level 3 is Level 2 data that has been mapped on a uniform space-time grid and
quality controlled.

- Level 4 is Level 3 data that has been combined with models or other instrument data.

- Level 3 &amp; 4 data is the easiest to use.

.footnote[NASA's Applied Remote Sensing Training Program]

# .gold[Section 2: Photogrammetry and Digital Image Processing]
---

# What is Photogrammetry
.pull-left[
Photogrammetry is the process of creating accurate 2D measurements or 3D models from photographs. It works by analyzing multiple overlapping images of an object, building, landscape, or scene and calculating the position of points in space.

- .blue[Combine several vertical photographs in the block of photography to create a photomosaic.]
- Objects can be identified by observing image characteristics such as shape, pattern, tone, and texture.
- .blue[The quantitative characteristics of objects such as size, orientation, and position can be determined.]
- Photogrammetry is used to create 3D models from photos.
]

.pull-right[
  .center[&lt;img src="images/Photo.png" style="width:100%;"&gt;]
]
---

# Principles of Photography and Imaging
- A camera is used to capture a photography and this process is called Photography.

--

- Photography, which means "drawing with light," originated long before cameras and light-sensitive
photographic films came into use.

--

- In the 1700s French artists used the pinhole principle as an aid in drawing perspective views of illuminated objects.

--

.center[&lt;img src="images/pinhole_cam.png" style="width:40%;border-radius:12px;"&gt;]

--

- In 1839 Louis Daguerre of France developed a photographic film which could capture a permanent record of images that illuminated it. By placing this film inside a dark "pinhole box," a picture or photograph could be obtained without the help of an artist.

---
# Principles of Photography and Imaging
- Perhaps the most fundamental device in the field of photogrammetry is the camera. It is the basic
instrument which acquires images, from which photogrammetric products are produced.

--

The traditional imaging device used in photogrammetry is the aerial mapping camera, and its use
is widespread in the photogrammetric industry.

--

The requirements of aerial mapping cameras are quite different from those of ordinary handheld cameras (most DSLRs)
---

# Digital Cameras
.pull-left[
A digital image is a computer-compatible pictorial rendition in which the image is divided into a fine
grid of "picture elements," or pixels.

* Digital imaging devices replace film by using solid-state sensors to convert light intensity into quantified pixel values in a digital image.
* A Charge-Coupled Device (CCD) detects incident light at each pixel location and generates an electric charge proportional to the light intensity.
* The generated charge is amplified, converted into digital form, and arranged in one- or two-dimensional sensor arrays on silicon chips.
* Complementary Metal-Oxide Semiconductor (CMOS) sensors are another type of solid-state image sensor used in some imaging applications alongside CCDs.
]
.pull-right[
  .center[&lt;img src="images/pixel.png" style="width:90%;border-radius:12px;"&gt;]
]
---

# Digital Image Representation and Resolution
.pull-left[
- Computers use pixel values from 0 to 255 because an 8-bit binary number can store 256 possible values.
- Digital images are created by sampling small areas called pixels, where each pixel records the light energy from part of the object.
- Smaller pixels provide higher geometric (spatial) resolution, resulting in clearer and more recognizable images.

***

The binary image requires only 1 bit of computer memory for each pixel ($2^1$ = 2), the 4-level image requires 2 bits ($2^2$ = 4), and the 8-level image requires 3 bits ($2^3$ = 8).

.f3.orange.b[Question?] A 3000-row by 3000-column satellite image has three spectral channels. If each pixel is represented by 8 bits (1 byte) per channel, how many bytes of computer memory are required to store the image?

--

For a satellite image:
* Rows = 3000
* Columns = 3000
* Spectral channels = 3
* Storage per pixel per channel = 1 byte

Total storage:
`\(3000 \times 3000 \times 3 \times 1\)`
`\(= 27{,}000{,}000 \text{ bytes}\)`

So, the image requires:

* **27,000,000 bytes**
* Approximately **27 MB** (decimal system)

# Flight planning in drone photogrammetry
Flight planning in drone photogrammetry refers to the process of designing and organizing a UAV survey.

The primary purpose of flight planning is to obtain high-quality overlapping images that can be processed into accurate orthomosaics, Digital Elevation Models (DEMs), and three-dimensional terrain models.

Key components of flight planning include:

- Flight altitude,
- Ground Sampling Distance (GSD),
- Forward and side overlap,
- Camera orientation,
- Flight speed,
- Battery and mission duration,
- Terrain following strategy,
- Weather and illumination conditions.

# Ground Sampling Distance (GSD)
A fundamental parameter in drone photogrammetry that defines the spatial resolution of an image.
- It represents the actual ground distance covered by a single pixel in the captured imagery, typically expressed in centimeters per pixel (cm/pixel).
- Lower GSD values indicate higher spatial resolution and finer terrain detail.
In UAV-based mapping, GSD depends on flight altitude, camera sensor size, focal length, and image dimensions.

The relationship is commonly expressed as:

`$$GSD = \frac{H \times S_w}{f \times I_w}$$`

where:

* `\(H\)` = flight height above ground,
* `\(S_w\)` = sensor width,
* `\(f\)` = focal length,
* `\(I_w\)` = image width in pixels.

In practice, UAV surveys for topographic mapping commonly target GSD values between 1-5 cm/pixel depending on the required positional accuracy and terrain complexity.
